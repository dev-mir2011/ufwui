<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFW Web UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png">
</head>

<body>
    <div class="container">
        <h1>UFW Web UI</h1>

        <!-- Status Section -->
        <div class="card">
            <h2>Firewall Status</h2>
            <p id="statusText">Loading...</p>

            <div class="btn-group">
                <button id="enableBtn">Enable Firewall</button>
                <button id="disableBtn" class="danger">Disable Firewall</button>
            </div>
        </div>

        <!-- Add Rule Section -->
        <div class="card">
            <h2>Add Rule</h2>

            <form id="ruleForm">
                <input type="number" id="port" placeholder="Port" required>

                <select id="protocol">
                    <option value="">Any Protocol</option>
                    <option value="tcp">TCP</option>
                    <option value="udp">UDP</option>
                </select>

                <select id="ruleType">
                    <option value="allow">Allow</option>
                    <option value="deny">Deny</option>
                    <option value="reject">Reject</option>
                    <option value="limit">Limit</option>
                </select>

                <button type="submit">Add Rule</button>
            </form>
        </div>

        <!-- Rules Table -->
        <div class="card">
            <h2>Firewall Rules</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Rule</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="rulesTableBody">
                    <tr>
                        <td colspan="3">Loading rules...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>

</html>
